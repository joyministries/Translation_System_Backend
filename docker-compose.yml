version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: curriculum_db
    environment:
      POSTGRES_USER: curriculum_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: curriculum_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curriculum_user -d curriculum_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: curriculum_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: curriculum_libretranslate
    environment:
      LT_LOAD_ONLY: en,sw,ha,yo,ig,am,zu,so,rw,af
      LT_DISABLE_FILES: "true"
      LT_DISABLE_METRICS: "true"
    volumes:
      - libretranslate_data:/home/libretranslate/.local
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/translate"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5m
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: curriculum_backend
    environment:
      DATABASE_URL: postgresql://curriculum_user:${DB_PASSWORD}@db/curriculum_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      LIBRETRANSLATE_URL: http://libretranslate:5000
      STORAGE_ROOT: /app/storage
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./storage:/app/storage
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: curriculum_celery
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql://curriculum_user:${DB_PASSWORD}@db/curriculum_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      LIBRETRANSLATE_URL: http://libretranslate:5000
      STORAGE_ROOT: /app/storage
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./storage:/app/storage
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      libretranslate:
        condition: service_healthy
    restart: unless-stopped

  celery_flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: curriculum_flower
    command: celery -A app.tasks.celery_app flower --port=5555 --url_prefix=flower
    environment:
      DATABASE_URL: postgresql://curriculum_user:${DB_PASSWORD}@db/curriculum_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      LIBRETRANSLATE_URL: http://libretranslate:5000
      STORAGE_ROOT: /app/storage
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5555:5555"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  libretranslate_data:
